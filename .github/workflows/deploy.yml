# GitHub Pages Deployment Workflow
# This workflow builds and deploys your Next.js static site to GitHub Pages
#
# Prerequisites:
# 1. Go to your repo Settings > Pages
# 2. Under "Build and deployment", set Source to "GitHub Actions"
# 3. Push your code and this workflow will automatically deploy

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static export
        env:
          # IMPORTANT: Replace 'data-analysis-toolkit' with your actual repo name
          # If your repo URL is github.com/username/my-cool-tool, use "my-cool-tool"
          # For username.github.io sites, remove or leave empty
          NEXT_PUBLIC_REPO_NAME: ${{ github.event.repository.name }}
        run: bun run build:static

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
